name: frontend-test

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: webfrontend
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Type check
        run: bun run type-check
      - name: Lint
        run: bun run lint
      - name: Run tests
        run: bun run test:run
